<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>{{TITLE}}</title>
  <meta name="description" content="{{DESCRIPTION}}">
  <meta name="author" content="Damini Estate">
  <meta name="theme-color" content="#0E0C0A">
  <meta name="color-scheme" content="dark">
  <meta name="format-detection" content="telephone=no">
  <meta name="apple-mobile-web-app-title" content="Damini Estate">
  <link rel="canonical" href="https://daminiestate.ae{{CANONICAL}}">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="manifest" href="/manifest.webmanifest">

  <meta property="og:type" content="website">
  <meta property="og:title" content="{{TITLE}}">
  <meta property="og:description" content="{{DESCRIPTION}}">
  <meta property="og:site_name" content="Damini Estate">
  <meta property="og:locale" content="en_US">
  <meta property="og:locale:alternate" content="ru_RU">
  <meta property="og:url" content="https://daminiestate.ae{{CANONICAL}}">
  <meta property="og:image" content="https://daminiestate.ae{{OG_IMAGE}}">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{TITLE}}">
  <meta name="twitter:description" content="{{DESCRIPTION}}">
  <meta name="twitter:image" content="https://daminiestate.ae{{OG_IMAGE}}">

  {{HEAD_EXTRA}}

  <!-- Self-hosted fonts: zero third-party requests, no render-blocking Google CSS. -->
  <link rel="preload" href="/assets/fonts/tenor-sans-normal-400-latin.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="/assets/fonts/cormorant-garamond-normal-400-latin.woff2" as="font" type="font/woff2" crossorigin>

  <link rel="stylesheet" href="/styles.css">

  <style>
    /* critical: paint base before styles.css lands, prevent FOUC */
    html{background:#0E0C0A}
    body{margin:0;background:#0E0C0A;color:#F5F0E8;font-family:'Tenor Sans',system-ui,-apple-system,'Segoe UI',Helvetica,Arial,sans-serif}
    /* ── Intro loader — FULLY self-contained here so it never depends on a
       cached styles.css/main.js. A pure-CSS animation auto-hides it after 4s
       even if JavaScript never runs, so the site can never be trapped. ── */
    #loader{position:fixed;inset:0;z-index:99999;background:#0E0C0A;display:flex;align-items:center;justify-content:center;text-align:center;animation:dmnLoaderSafety 0s linear 4s forwards}
    html.loaded #loader{display:none}
    #loader.loader-hide{opacity:0;visibility:hidden;pointer-events:none;transition:opacity .6s ease}
    #loader .loader-d{display:block;font-family:'Cormorant Garamond',Georgia,serif;font-size:clamp(2.4rem,7vw,4.5rem);font-weight:300;letter-spacing:.5em;text-indent:.5em;color:#C9B99A;text-transform:uppercase;line-height:1}
    #loader .loader-e{display:block;margin-top:14px;font-family:'Tenor Sans',system-ui,sans-serif;font-size:clamp(.5rem,1.5vw,.72rem);letter-spacing:.45em;text-indent:.45em;color:rgba(201,185,154,.6);text-transform:uppercase}
    #loader .loader-line{display:block;height:1px;width:0;margin:26px auto 0;background:linear-gradient(to right,transparent,#A8895A,transparent);animation:dmnLoaderLine 1.4s ease .4s forwards}
    @keyframes dmnLoaderSafety{to{opacity:0;visibility:hidden;pointer-events:none}}
    @keyframes dmnLoaderLine{to{width:200px}}
    @media(prefers-reduced-motion:reduce){#loader{animation-delay:.2s}#loader .loader-line{animation:none;width:200px}}
  </style>
  <!-- JS disabled → hide the loader immediately -->
  <noscript><style>#loader{display:none!important}</style></noscript>

  <!-- Loader gate (first-party, CSP-safe, synchronous): adds html.loaded to
       skip the intro instantly on repeat pages in the same visit and when the
       visitor prefers reduced motion — so it only shows on the first arrival. -->
  <script src="/loader-gate.js"></script>

  <script src="/main.js" defer></script>
</head>
<body>

<div id="loader" aria-hidden="true">
  <div class="loader-inner">
    <span class="loader-d">Damini</span>
    <span class="loader-e">Dubai &middot; Luxury Real Estate</span>
    <span class="loader-line"></span>
  </div>
</div>
