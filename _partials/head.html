<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>{{TITLE}}</title>
  <meta name="description" content="{{DESCRIPTION}}">
  <meta name="author" content="Damini Estate">
  <meta name="robots" content="{{ROBOTS}}">
  <meta name="theme-color" content="#0E0C0A">
  <meta name="color-scheme" content="dark">
  <meta name="format-detection" content="telephone=no">
  <meta name="apple-mobile-web-app-title" content="Damini Estate">
  <link rel="canonical" href="https://daminiestate.ae{{CANONICAL}}">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="manifest" href="/manifest.webmanifest">

  <meta property="og:type" content="website">
  <meta property="og:title" content="{{TITLE}}">
  <meta property="og:description" content="{{DESCRIPTION}}">
  <meta property="og:site_name" content="Damini Estate">
  <meta property="og:locale" content="en_US">
  <meta property="og:locale:alternate" content="ru_RU">
  <meta property="og:url" content="https://daminiestate.ae{{CANONICAL}}">
  <meta property="og:image" content="https://daminiestate.ae{{OG_IMAGE}}">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:image:alt" content="Damini Estate, Dubai real estate">
  <meta property="og:image:type" content="image/jpeg">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{TITLE}}">
  <meta name="twitter:description" content="{{DESCRIPTION}}">
  <meta name="twitter:image" content="https://daminiestate.ae{{OG_IMAGE}}">
  <meta name="twitter:image:alt" content="Damini Estate, Dubai real estate">

  {{HEAD_EXTRA}}

  <!-- Self-hosted fonts: zero third-party requests, no render-blocking Google CSS. -->
  <link rel="preload" href="/assets/fonts/tenor-sans-normal-400-latin.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="/assets/fonts/cormorant-garamond-normal-400-latin.woff2" as="font" type="font/woff2" crossorigin>

  <link rel="stylesheet" href="/styles.css">

  <style>
    /* critical: paint base before styles.css lands, prevent FOUC */
    html{background:#0E0C0A}
    body{margin:0;background:#0E0C0A;color:#F5F0E8;font-family:'Tenor Sans',system-ui,-apple-system,'Segoe UI',Helvetica,Arial,sans-serif}
    /* ── Intro loader. FULLY self-contained here so it never depends on a
       cached styles.css/main.js. A pure-CSS animation auto-hides it after 5s
       even if JavaScript never runs, so the site can never be trapped. ── */
    #loader{position:fixed;inset:0;z-index:99999;background:#0E0C0A;display:flex;align-items:center;justify-content:center;text-align:center;overflow:hidden;animation:dmnLoaderSafety 0s linear 5s forwards}
    html.loaded #loader{display:none}
    /* fluid fade-out (opacity + a touch of scale) when the site is ready */
    #loader.loader-hide{opacity:0;visibility:hidden;pointer-events:none;transition:opacity 1s ease,visibility 1s ease}
    #loader.loader-hide .loader-inner{transform:translateY(-6px) scale(1.02);transition:transform 1s ease}
    /* faint Dubai backdrop, slowly drifting + fading in behind the wordmark */
    #loader .loader-bg{position:absolute;inset:0;z-index:0;background:#0E0C0A url('/assets/img/hero-dubai.jpg') center/cover no-repeat;opacity:0;animation:dmnLoaderBg 2.6s ease .3s forwards,dmnLoaderZoom 12s ease-out .3s forwards}
    #loader .loader-bg::after{content:"";position:absolute;inset:0;background:radial-gradient(ellipse at center,rgba(14,12,10,.55) 0%,rgba(14,12,10,.9) 70%,#0E0C0A 100%)}
    #loader .loader-inner{position:relative;z-index:1;opacity:0;animation:dmnLoaderIn 1.3s ease .15s forwards}
    #loader .loader-logo{display:block;height:clamp(38px,7vw,64px);width:auto;margin:0 auto}
    #loader .loader-e{display:block;margin-top:14px;font-family:'Tenor Sans',system-ui,sans-serif;font-size:clamp(.5rem,1.5vw,.72rem);letter-spacing:.45em;text-indent:.45em;color:rgba(201,185,154,.6);text-transform:uppercase;opacity:0;animation:dmnLoaderFade 1.4s ease .7s forwards}
    #loader .loader-line{display:block;height:1px;width:0;margin:26px auto 0;background:linear-gradient(to right,transparent,#A8895A,transparent);animation:dmnLoaderLine 1.6s ease .6s forwards}
    @keyframes dmnLoaderSafety{to{opacity:0;visibility:hidden;pointer-events:none}}
    @keyframes dmnLoaderIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
    @keyframes dmnLoaderFade{to{opacity:1}}
    @keyframes dmnLoaderLine{to{width:200px}}
    @keyframes dmnLoaderBg{to{opacity:.32}}
    @keyframes dmnLoaderZoom{from{transform:scale(1.0)}to{transform:scale(1.08)}}
    @media(prefers-reduced-motion:reduce){
      #loader{animation-delay:.3s}
      #loader .loader-bg{animation:dmnLoaderBg .4s ease forwards;opacity:.28}
      #loader .loader-inner,#loader .loader-e{animation:none;opacity:1}
      #loader .loader-line{animation:none;width:200px}
      #loader.loader-hide .loader-inner{transform:none}
    }
  </style>
  <!-- JS disabled: hide the loader AND force reveal-on-scroll content visible
       (the IntersectionObserver never runs without JS, so .reveal would stay
       invisible). Belt-and-suspenders with the @media (scripting:none) rule. -->
  <noscript><style>#loader{display:none!important}.reveal{opacity:1!important;transform:none!important}</style></noscript>

  <!-- Loader gate (first-party, CSP-safe, synchronous): adds html.loaded to
       skip the intro instantly on repeat pages in the same visit and when the
       visitor prefers reduced motion, so it only shows on the first arrival. -->
  <script src="/loader-gate.js"></script>

  <script src="/main.js" defer></script>
</head>
<body>

<div id="loader" aria-hidden="true">
  <div class="loader-bg"></div>
  <div class="loader-inner">
    <img class="loader-logo" src="/assets/img/logo.png" alt="Damini Estate">
    <span class="loader-e">Dubai &middot; Luxury Real Estate</span>
    <span class="loader-line"></span>
  </div>
</div>
