<!-- ════════════════════════════════════════════════════════════════════════
     GHL EMAIL TEMPLATE — Internal new-lead alert (sent TO your team)
     Use in a GHL Workflow "Send Internal Notification" (Email) action.
     Recipients: info@daminiestate.ae, lola@…, + whoever should get leads.
     ════════════════════════════════════════════════════════════════════════ -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"></head>
<body style="margin:0;padding:0;background:#f4f3f1;font-family:Arial,Helvetica,sans-serif;color:#2b2b2b">
<table role="presentation" width="100%" cellpadding="0" cellspacing="0"><tr><td align="center" style="padding:28px 16px">
  <table role="presentation" width="600" cellpadding="0" cellspacing="0" style="max-width:600px;width:100%;background:#fff;border:1px solid #e4e2dd">
    <tr><td style="background:#0E0C0A;padding:18px 28px;color:#C9B99A;font-size:13px;letter-spacing:3px;text-transform:uppercase">New Website Enquiry</td></tr>
    <tr><td style="padding:28px">
      <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="font-size:14px;line-height:1.9">
        <tr><td style="width:120px;color:#888">Name</td><td><strong>{{contact.first_name}} {{contact.last_name}}</strong></td></tr>
        <tr><td style="color:#888">Email</td><td><a href="mailto:{{contact.email}}" style="color:#A8895A">{{contact.email}}</a></td></tr>
        <tr><td style="color:#888">Phone</td><td><a href="tel:{{contact.phone}}" style="color:#A8895A">{{contact.phone}}</a></td></tr>
        <tr><td style="color:#888">Interested in</td><td>{{contact.interest}}</td></tr>
        <tr><td style="color:#888;vertical-align:top">Message</td><td>{{contact.message}}</td></tr>
        <tr><td style="color:#888">Source</td><td>{{contact.source}}</td></tr>
      </table>
      <p style="margin:24px 0 0">
        <a href="https://wa.me/{{contact.phone}}" style="display:inline-block;background:#25D366;color:#fff;text-decoration:none;font-size:13px;padding:11px 20px;border-radius:4px">WhatsApp the lead</a>
      </p>
    </td></tr>
    <tr><td style="padding:16px 28px;border-top:1px solid #e4e2dd;font-size:11px;color:#999">Damini Estate · automated lead alert from GoHighLevel</td></tr>
  </table>
</td></tr></table></body></html>
<!-- NOTE: if "interest" and "message" don't appear, create matching custom
     fields in GHL (Settings → Custom Fields) with keys interest / message, OR
     read them from the contact Note that the website function always attaches. -->
